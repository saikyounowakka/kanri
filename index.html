<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>StuD_E_Ｚ Tracker</title>

    <!-- PWA メタタグ -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="StuD_E_Ｚ" />
    <meta name="theme-color" content="#4f46e5" />

    <!-- インラインマニフェスト -->
    <link rel="manifest"
        href="data:application/json;base64,eyJuYW1lIjoi5a2m57+S6KGT6Yz85b6MIiwic2hvcnRfbmFtZSI6IuWtpue/kuiThuaNhSIsInN0YXJ0X3VybCI6Ii4iLCJkaXNwbGF5Ijoic3RhbmRhbG9uZSIsImJhY2tncm91bmRfY29sb3IiOiIjMGYwZjIzIiwidGhlbWVfY29sb3IiOiIjNGY0NmU1In0=" />

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <!-- chartjs-plugin-datalabels -->
    <script
        src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>

    <style>
        /* カスタムフォント・ベーススタイル */
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap');

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            background: #0f0f23;
            color: #e2e8f0;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* グラスモーフィズムカード（スクロール内コンテンツ用：blurなし）*/
        .glass {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* 固定ヘッダー・ナビ用（blurあり：対象が少ないのでGPU負荷低い）*/
        .glass-fixed {
            background: rgba(15, 15, 35, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* インプットスタイル */
        .form-input {
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            color: #e2e8f0;
            padding: 10px 14px;
            width: 100%;
            font-size: 16px;
            /* iOSズーム防止 */
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-input:focus {
            outline: none;
            border-color: #818cf8;
            box-shadow: 0 0 0 3px rgba(129, 140, 248, 0.2);
        }

        .form-input option {
            background: #1e1e3f;
            color: #e2e8f0;
        }

        /* ボトムナビ */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: calc(64px + env(safe-area-inset-bottom));
            background: rgba(15, 15, 35, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 100;
            display: flex;
            justify-content: center;
        }

        /* メインコンテンツの底上げ（ナビと被らないように） */
        main {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            padding-top: 120px !important;
            /* さらに余裕を持ってヘッダー分を空ける */
            padding-bottom: calc(160px + env(safe-area-inset-bottom)) !important;
            min-height: 100vh;
        }

        .max-width-container {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
        }

        .nav-btn {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            padding: 10px 0 max(10px, env(safe-area-inset-bottom));
            font-size: 11px;
            color: #94a3b8;
            cursor: pointer;
            transition: color 0.2s;
            border: none;
            background: none;
        }

        .nav-btn.active {
            color: #818cf8;
        }

        .nav-btn svg {
            width: 24px;
            height: 24px;
            stroke-width: 1.8;
        }

        /* タイムラインカード */
        .timeline-card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            padding: 14px 16px;
            margin-bottom: 10px;
            transition: transform 0.15s, box-shadow 0.15s;
            animation: fadeInUp 0.3s ease both;
        }

        .timeline-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 送信ボタン */
        .submit-btn {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.35);
        }

        .submit-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.5);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* スクロールバー非表示 */
        ::-webkit-scrollbar {
            display: none;
        }

        /* タブコンテンツの切り替え */
        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* ユーザーバッジカラー */
        .user-badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 9999px;
            font-size: 11px;
            font-weight: 600;
            margin-right: 6px;
        }

        /* カテゴリバッジ */
        .cat-study {
            background: rgba(129, 140, 248, 0.2);
            color: #a5b4fc;
            border: 1px solid rgba(129, 140, 248, 0.3);
        }

        .cat-rest {
            background: rgba(52, 211, 153, 0.2);
            color: #6ee7b7;
            border: 1px solid rgba(52, 211, 153, 0.3);
        }

        .cat-other {
            background: rgba(251, 191, 36, 0.2);
            color: #fcd34d;
            border: 1px solid rgba(251, 191, 36, 0.3);
        }

        /* グラフコンテナ */
        .chart-wrap {
            position: relative;
            width: 100%;
            height: 260px;
            /* 少し低くしてバランスを調整 */
        }

        canvas {
            display: block;
            width: 100% !important;
            height: auto !important;
        }

        /* トースト通知 */
        #toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s;
            z-index: 9999;
            white-space: nowrap;
        }

        #toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        #toast.success {
            background: #065f46;
            color: #6ee7b7;
            border: 1px solid #059669;
        }

        #toast.error {
            background: #7f1d1d;
            color: #fca5a5;
            border: 1px solid #dc2626;
        }

        label {
            display: block;
            font-size: 12px;
            color: #94a3b8;
            margin-bottom: 5px;
            font-weight: 500;
        }

        /* セクションラベル */
        .section-title {
            font-size: 13px;
            font-weight: 600;
            color: #818cf8;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        /* 空状態 */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #475569;
        }

        /* loading spinner */
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.7s linear infinite;
            margin-right: 6px;
            vertical-align: middle;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ===== タイマー・ストップウォッチ ===== */
        .timer-mode-tab {
            flex: 1;
            padding: 8px 0;
            border: none;
            background: none;
            color: #94a3b8;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.2s;
        }

        .timer-mode-tab.active {
            background: rgba(129, 140, 248, 0.2);
            color: #818cf8;
        }

        .timer-display {
            font-size: clamp(48px, 13vw, 76px);
            font-weight: 700;
            letter-spacing: 0.05em;
            color: #fff;
            font-variant-numeric: tabular-nums;
            line-height: 1;
            text-align: center;
            text-shadow: 0 0 30px rgba(129, 140, 248, 0.5);
            transition: color 0.3s;
        }

        .timer-display.running {
            color: #a5b4fc;
            text-shadow: 0 0 40px rgba(129, 140, 248, 0.8);
        }

        .timer-display.finished {
            color: #f87171;
            text-shadow: 0 0 40px rgba(248, 113, 113, 0.8);
            animation: timerPulse 0.6s ease-in-out infinite alternate;
        }

        @keyframes timerPulse {
            from {
                opacity: 0.7;
            }

            to {
                opacity: 1.0;
            }
        }

        .timer-ms {
            font-size: 26px;
            color: #64748b;
            font-weight: 600;
            letter-spacing: 0.04em;
        }

        .progress-ring {
            transform: rotate(-90deg);
            transition: stroke-dashoffset 1s linear;
        }

        .timer-btn {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.18s;
        }

        .timer-btn:hover:not(:disabled) {
            transform: scale(1.08);
        }

        .timer-btn:active {
            transform: scale(0.95);
        }

        .timer-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .timer-btn-start {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.45);
            color: white;
        }

        .timer-btn-start.pause {
            background: linear-gradient(135deg, #f59e0b, #ef4444);
            box-shadow: 0 4px 20px rgba(239, 68, 68, 0.4);
        }

        .timer-btn-sub {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: #94a3b8;
        }

        .lap-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 12px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.07);
            font-size: 13px;
            margin-bottom: 6px;
            animation: fadeInUp 0.25s ease both;
        }

        input[type=range] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.12);
            outline: none;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #6366f1;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(99, 102, 241, 0.5);
        }

        /* カウントダウンプリセットボタン */
        .cd-preset-btn {
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid rgba(129, 140, 248, 0.35);
            background: rgba(129, 140, 248, 0.1);
            color: #94a3b8;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
        }

        .cd-preset-btn:hover {
            background: rgba(129, 140, 248, 0.25);
            color: #c7d2fe;
            border-color: rgba(129, 140, 248, 0.6);
        }

        .cd-preset-btn.selected {
            background: rgba(129, 140, 248, 0.3);
            color: #818cf8;
            border-color: #818cf8;
            box-shadow: 0 0 10px rgba(129, 140, 248, 0.3);
        }
    </style>
</head>

<body class="bg-[#0f0f23]">

    <!-- ===== ヘッダー ===== -->
    <header class="glass-fixed fixed top-0 left-0 right-0 z-[110] px-5 py-4 flex justify-center"
        style="padding-top: max(20px, env(safe-area-inset-top));">
        <div class="w-full max-width-container flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div
                    style="background: linear-gradient(135deg, #6366f1, #8b5cf6); border-radius: 10px; padding: 6px; display:flex; align-items:center; justify-content:center;">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                        style="width:18px;height:18px;color:white;">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.746 0 3.332.477 4.5 1.253v13C19.832 18.477 18.246 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                    </svg>
                </div>
                <div>
                    <h1 class="text-base font-bold text-white leading-tight">StuD_E_Ｚ Tracker</h1>
                    <p id="headerDate" class="text-xs text-slate-400"></p>
                </div>
            </div>
            <button id="refreshBtn" onclick="loadData()" class="p-2 rounded-xl"
                style="background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.1);">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                    style="width:18px;height:18px;color:#94a3b8;">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                </svg>
            </button>
        </div>
    </header>

    <!-- ===== メインコンテンツ ===== -->
    <main class="flex-1 overflow-y-auto px-4 py-4" id="mainContent">

        <!-- ===== 記録タブ ===== -->
        <div id="tab-record" class="tab-content active">

            <!-- 入力フォーム -->
            <div class="glass rounded-2xl p-5 mb-5">
                <p class="section-title">📝 新しい記録を追加</p>

                <div class="space-y-4">
                    <!-- お名前 -->
                    <div>
                        <label for="userName">お名前（ニックネーム）<span class="text-red-400 ml-1">*</span></label>
                        <input type="text" id="userName" class="form-input" placeholder="例：たろう" oninput="renderCharts()"
                            required />
                    </div>

                    <!-- 日付 -->
                    <div>
                        <label for="date">日付</label>
                        <input type="date" id="date" class="form-input" />
                    </div>

                    <!-- カテゴリ -->
                    <div>
                        <label for="category">カテゴリ</label>
                        <select id="category" class="form-input" onchange="toggleStudyFields()">
                            <option value="学習">📚 学習</option>
                            <option value="休憩">☕ 休憩</option>
                            <option value="運動">🏃 運動</option>
                            <option value="食事">🍽️ 食事</option>
                            <option value="睡眠">😴 睡眠</option>
                            <option value="その他">📌 その他</option>
                        </select>
                    </div>

                    <!-- 教科・学習内容（学習時のみ） -->
                    <div id="studyFields">
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label for="subject">教科</label>
                                <select id="subject" class="form-input">
                                    <option value="数学">数学</option>
                                    <option value="英語">英語</option>
                                    <option value="国語">国語</option>
                                    <option value="理科">理科</option>
                                    <option value="社会">社会</option>
                                    <option value="物理">物理</option>
                                    <option value="化学">化学</option>
                                    <option value="生物">生物</option>
                                    <option value="日本史">日本史</option>
                                    <option value="世界史">世界史</option>
                                    <option value="地理">地理</option>
                                    <option value="情報">情報</option>
                                    <option value="プログラミング">プログラミング</option>
                                    <option value="その他">その他</option>
                                </select>
                            </div>
                            <div>
                                <label for="content">学習内容</label>
                                <input type="text" id="content" class="form-input" placeholder="例：微分の演習" />
                            </div>
                        </div>
                    </div>

                    <!-- 時間 -->
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label for="startTime">開始時間</label>
                            <input type="time" id="startTime" class="form-input" />
                        </div>
                        <div>
                            <label for="endTime">終了時間</label>
                            <input type="time" id="endTime" class="form-input" />
                        </div>
                    </div>

                    <!-- メモ -->
                    <div>
                        <label for="memo">メモ（任意）</label>
                        <textarea id="memo" class="form-input" rows="2" placeholder="気づきや感想など..."
                            style="resize:none;"></textarea>
                    </div>

                    <!-- 送信ボタン -->
                    <button id="submitBtn" class="submit-btn" onclick="submitRecord()">
                        記録を送信
                    </button>
                </div>
            </div>

            <!-- タイムライン -->
            <div>
                <p class="section-title">🕐 みんなの記録（新しい順）</p>
                <div id="timeline">
                    <div class="empty-state">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                            style="width:40px;height:40px;margin:0 auto 12px;color:#334155;">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                                d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                        </svg>
                        <p>まだ記録がありません</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- ===== グラフタブ ===== -->
        <div id="tab-graph" class="tab-content">

            <!-- 今日の行動内訳（ドーナツグラフ） -->
            <div class="glass rounded-2xl p-5 mb-4">
                <p class="section-title">🍩 あなたの今日の行動内訳</p>
                <div class="chart-wrap" style="max-height: 260px;">
                    <canvas id="donutChart"></canvas>
                </div>
                <p id="donutEmpty" class="empty-state" style="display:none; padding:20px 0;">今日のデータがまだありません</p>
            </div>

            <!-- 学習時間の推移（積み上げ棒グラフ） -->
            <div class="glass rounded-2xl p-5 mb-4">
                <p class="section-title">📊 あなたの学習時間の推移</p>
                <div class="chart-wrap" style="max-height: 300px;">
                    <canvas id="barChart"></canvas>
                </div>
                <p id="barEmpty" class="empty-state" style="display:none; padding:20px 0;">学習データがまだありません</p>
            </div>

            <!-- デバッグ情報 (開発用) -->
            <div id="debugArea"
                class="mt-8 p-4 bg-slate-900 border border-slate-700 rounded-xl text-xs font-mono text-slate-400"
                style="display:none;">
                <p class="font-bold text-slate-300 mb-2 border-b border-slate-700 pb-1">🔍 Debug Info</p>
                <div id="debugContent"></div>
            </div>

        </div>

        <!-- ===== 質問タブ ===== -->
        <div id="tab-question" class="tab-content">

            <!-- 質問投稿フォーム -->
            <div class="glass rounded-2xl p-5 mb-5">
                <p class="section-title">❓ 質問を投稿する</p>
                <div class="space-y-4">
                    <!-- 教科 -->
                    <div>
                        <label for="qSubject">教科</label>
                        <select id="qSubject" class="form-input">
                            <option value="数学">数学</option>
                            <option value="英語">英語</option>
                            <option value="国語">国語</option>
                            <option value="理科">理科</option>
                            <option value="社会">社会</option>
                            <option value="物理">物理</option>
                            <option value="化学">化学</option>
                            <option value="生物">生物</option>
                            <option value="日本史">日本史</option>
                            <option value="世界史">世界史</option>
                            <option value="地理">地理</option>
                            <option value="情報">情報</option>
                            <option value="プログラミング">プログラミング</option>
                            <option value="その他">その他</option>
                        </select>
                    </div>
                    <!-- タイトル -->
                    <div>
                        <label for="qTitle">タイトル <span class="text-red-400 ml-1">*</span></label>
                        <input type="text" id="qTitle" class="form-input" placeholder="例：微分の計算が分かりません" />
                    </div>
                    <!-- 質問内容 -->
                    <div>
                        <label for="qBody">質問内容 <span class="text-red-400 ml-1">*</span></label>
                        <textarea id="qBody" class="form-input" rows="4"

                                <button onclick="cdPreset(40)" id="preset40" class="cd-preset-btn">40分</button>
                                <button onclick="cdPreset(50)" id="preset50" class="cd-preset-btn">50分</button>

                        <div class="grid grid-cols-2 gap-3">

                                    d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />

                                stroke="currentColor" style="width:28px;height:28px;" id="cdIcon">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" />

    <!-- ===== ボトムナビゲーション ===== -->

                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />

                        d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
                </svg>
                <span>グラフ</span>
            </button>

                        d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />

    <!-- トースト通知 -->
    <div id="toast"></div>

    <script>
        // =====================================================
        // ★ここにGASのWebアプリURLを貼り付けてください★
        // =====================================================
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbwnS8Tl0GzucDQ8Iyo-jnXXybHhXuEosAyV56sa6mMtHVySOOeELJmw4-f_HWPDpGo1-w/exec';
        // =====================================================

        // Chart.js プラグインの登録
        Chart.register(ChartDataLabels);

        // ===== グローバル変数 =====
        let allRecords = [];       // GASから取得した全データ
        let donutChartInst = null; // ドーナツグラフのインスタンス
        let barChartInst = null;   // 棒グラフのインスタンス
        let currentTab = 'record';
        const isDebug = false;     // 本番モード（デバッグ表示を無効化）

        // ユーザーバッジ用カラーパレット
        const USER_COLORS = [
            '#818cf8', '#f472b6', '#34d399', '#fb923c', '#60a5fa',
            '#a78bfa', '#fbbf24', '#f87171', '#4ade80', '#38bdf8'
        ];
        const userColorMap = {};
        let userColorIndex = 0;

        function getUserColor(name) {
            if (!userColorMap[name]) {
                userColorMap[name] = USER_COLORS[userColorIndex % USER_COLORS.length];
                userColorIndex++;
            }
            return userColorMap[name];
        }

        // カテゴリカラーマップ
        const CAT_COLORS = {
            '学習': '#818cf8',
            '休憩': '#34d399',
            '運動': '#fb923c',
            '食事': '#f472b6',
            '睡眠': '#60a5fa',
            'その他': '#a78bfa',
        };

        // 教科カラーマップ（積み上げ棒グラフ用）
        const SUBJECT_COLORS = [
            '#818cf8', '#f472b6', '#34d399', '#fb923c', '#60a5fa',
            '#a78bfa', '#fbbf24', '#f87171', '#4ade80', '#38bdf8',
            '#c084fc', '#2dd4bf'
        ];
        const subjectColorMap = {};
        let subjectColorIdx = 0;

        function getSubjectColor(subj) {
            if (!subjectColorMap[subj]) {
                subjectColorMap[subj] = SUBJECT_COLORS[subjectColorIdx % SUBJECT_COLORS.length];
                subjectColorIdx++;
            }
            return subjectColorMap[subj];
        }

        // ===== 初期化 =====
        document.addEventListener('DOMContentLoaded', () => {
            // 今日の日付を設定
            const today = getTodayStr();
            document.getElementById('date').value = today;
            document.getElementById('headerDate').textContent = formatDateJP(today);

            // localStorageからユーザー名を復元
            const savedName = localStorage.getItem('studyapp_username');
            if (savedName) document.getElementById('userName').value = savedName;

            // データ読み込み
            loadData();
        });

        // ===== タブ切り替え =====
        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            document.getElementById('nav-' + tab).classList.add('active');

            // グラフタブに切り替えた時はグラフを再描画
            if (tab === 'graph') {
                renderCharts();
            }
            // 質問タブに切り替えた時は質問一覧を読み込む
            if (tab === 'question') {
                loadQuestions();
            }
            // タイマータブ: 特別な初期化なし（JSがすでに待機状態）
        }

        // ===== 学習フィールドの表示/非表示 =====
        function toggleStudyFields() {
            const cat = document.getElementById('category').value;
            document.getElementById('studyFields').style.display = (cat === '学習') ? 'block' : 'none';
        }

        // ===== データ送信 =====
        async function submitRecord() {
            const userName = document.getElementById('userName').value.trim();
            const date = document.getElementById('date').value;
            const category = document.getElementById('category').value;
            const subject = document.getElementById('subject').value;
            const content = document.getElementById('content').value.trim();
            const startTime = document.getElementById('startTime').value;
            const endTime = document.getElementById('endTime').value;
            const memo = document.getElementById('memo').value.trim();

            // バリデーション
            if (!userName) {
                showToast('お名前を入力してください', 'error');
                document.getElementById('userName').focus();
                return;
            }
            if (!date) {
                showToast('日付を選択してください', 'error');
                return;
            }
            if (GAS_URL === 'ここにGASのWebアプリURLを貼り付けます') {
                showToast('GASのURLが設定されていません', 'error');
                return;
            }

            // ユーザー名をlocalStorageに保存
            localStorage.setItem('studyapp_username', userName);

            // ボタンをローディング状態に
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>送信中...';

            const payload = { userName, date, category, subject, content, startTime, endTime, memo };

            try {
                const res = await fetch(GAS_URL, {
                    method: 'POST',
                    mode: 'no-cors', // GASのCORS制限を回避
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                // no-corsではレスポンス読み取り不可のため成功とみなす
                showToast('✅ 記録しました！', 'success');

                // フォームリセット（日付・名前は維持）
                document.getElementById('category').value = '学習';
                document.getElementById('subject').value = '数学';
                document.getElementById('content').value = '';
                document.getElementById('startTime').value = '';
                document.getElementById('endTime').value = '';
                document.getElementById('memo').value = '';
                toggleStudyFields();

                // データ再取得
                setTimeout(() => loadData(), 1000);

            } catch (err) {
                console.error(err);
                showToast('❌ 送信に失敗しました', 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '記録を送信';
            }
        }

        // ===== データ取得 =====
        async function loadData() {
            const refreshBtn = document.getElementById('refreshBtn');
            refreshBtn.style.opacity = '0.4';

            if (GAS_URL === 'ここにGASのWebアプリURLを貼り付けます') {
                renderTimeline([]);
                renderCharts();
                refreshBtn.style.opacity = '1';
                return;
            }

            try {
                const res = await fetch(GAS_URL + '?t=' + Date.now());
                const json = await res.json();

                if (json.status === 'success') {
                    // 全データの日付をあらかじめJST形式の YYYY-MM-DD に統一
                    allRecords = (json.data || []).map(r => ({
                        ...r,
                        date: normalizeDate(r.date)
                    }));

                    console.log('Data loaded:', allRecords.length);
                    renderTimeline(allRecords);
                    // タブに関わらずデータ読み込み時はグラフの裏側データも準備
                    renderCharts();
                } else {
                    console.error('GASエラー:', json.message);
                }
            } catch (err) {
                console.error('データ取得エラー:', err);
                showToast('データの取得に失敗しました', 'error');
            } finally {
                refreshBtn.style.opacity = '1';
            }
        }

        // ISO形式（1899-12-...）が来た場合もHH:mmに変換して表示（タイムライン用ヘルパー）
        function fmtTimeDisplay(s) {
            if (!s) return '';
            s = String(s).trim();
            if (s.includes('T')) {
                const jst = new Date(new Date(s).getTime() + 9 * 60 * 60 * 1000);
                return String(jst.getUTCHours()).padStart(2, '0') + ':' + String(jst.getUTCMinutes()).padStart(2, '0');
            }
            return s.substring(0, 5);
        }

        // ===== タイムライン描画 =====
        function renderTimeline(records) {
            const container = document.getElementById('timeline');

            if (!records || records.length === 0) {
                container.innerHTML = `
      <div class="empty-state">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" style="width:40px;height:40px;margin:0 auto 12px;color:#334155;">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        <p>まだ記録がありません</p>
      </div>`;
                return;
            }

            container.innerHTML = records.map((r, i) => {
                const userColor = getUserColor(r.userName);
                const catClass = getCatClass(r.category);
                const duration = calcDuration(r.startTime, r.endTime);
                const st = fmtTimeDisplay(r.startTime);
                const et = fmtTimeDisplay(r.endTime);
                const timeStr = st && et ? `${st} ～ ${et}${duration ? ` (${duration})` : ''}` : (st || '');

                return `
      <div class="timeline-card" style="animation-delay:${i * 0.04}s;">
        <div class="flex items-center justify-between mb-2">
          <div class="flex items-center flex-wrap gap-1">
            <span class="user-badge" style="background:${userColor}22; color:${userColor}; border:1px solid ${userColor}44;">
              ${escapeHtml(r.userName)}
            </span>
            <span class="user-badge ${catClass}">
              ${getCatIcon(r.category)} ${escapeHtml(r.category)}
            </span>
            ${r.category === '学習' && r.subject ? `<span class="user-badge" style="background:rgba(255,255,255,0.07);color:#cbd5e1;border:1px solid rgba(255,255,255,0.12);">${escapeHtml(r.subject)}</span>` : ''}
          </div>
          <span class="text-xs text-slate-500">${formatDateJP(r.date)}</span>
        </div>
        ${r.content ? `<p class="text-sm text-slate-200 mb-1 font-medium">${escapeHtml(r.content)}</p>` : ''}
        ${timeStr ? `<p class="text-xs text-slate-400 mb-1">🕐 ${timeStr}</p>` : ''}

        function renderBarChart() {
            if (typeof Chart === 'undefined') return;
            const userNameInput = document.getElementById('userName').value.trim();
            if (!userNameInput) {
                const barEmpty = document.getElementById('barEmpty');

            // 現在のユーザーかつ学習カテゴリなら全て対象にする（時間は未入力でもOK）
            const myStudyRecords = allRecords.filter(r => {
                const rName = String(r.userName || "").trim().toLowerCase();
                const uName = userNameInput.toLowerCase();
                const matchName = rName === uName;
                return matchName && r.category === '学習';

            const barEmpty = document.getElementById('barEmpty');

                return;
            }

            // 日付 × 教科 で集計
            const dateSet = new Set();
            const subjectSet = new Set();
            const pivot = {}; // pivot[date][subject] = minutes

            myStudyRecords.forEach(r => {
                let dur = calcDurationMin(r.startTime, r.endTime);
                if (dur <= 0) dur = 30; // 時間未入力・エラー時は30分として表示
                const subj = r.subject || 'その他';
                dateSet.add(r.date);
                subjectSet.add(subj);
                if (!pivot[r.date]) pivot[r.date] = {};
                pivot[r.date][subj] = (pivot[r.date][subj] || 0) + dur;
            });

            if (dateSet.size === 0) {
                canvas.style.display = 'none';
                barEmpty.textContent = '学習時間の記録（開始・終了）がまだありません';
                barEmpty.style.display = 'block';
                if (barChartInst) { barChartInst.destroy(); barChartInst = null; }

            if (isDebug) {
                const debugContent = document.getElementById('debugContent');

            canvas.style.display = 'block';
            barEmpty.style.display = 'none';

            // 日付昇順ソート
            const dates = Array.from(dateSet).sort();
            const subjects = Array.from(subjectSet);

            const datasets = subjects.map(subj => ({
                label: subj,
                data: dates.map(d => Math.round(((pivot[d] && pivot[d][subj]) || 0) / 60 * 10) / 10),
                backgroundColor: getSubjectColor(subj) + 'cc',

                borderRadius: 4,
                borderSkipped: false
            }));

            if (barChartInst) {
                barChartInst.data.labels = dates.map(d => formatDateShort(d));
                barChartInst.data.datasets = datasets;
                barChartInst.update('none');
                return;
            }
            barChartInst = new Chart(canvas, {
                type: 'bar',
                plugins: [ChartDataLabels],
                data: {
                    labels: dates.map(d => formatDateShort(d)),
                    datasets
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false, // 高さを固定するためにfalse
                    layout: {
                        padding: {
                            top: 10,
                            bottom: 10,
                            left: 5,
                            right: 5
                        }
                    },
                    scales: {
                        x: {
                            stacked: true,
                            grid: { color: 'rgba(255,255,255,0.04)' },
                            ticks: {
                                color: '#94a3b8',
                                font: { size: 10 },
                                maxRotation: 45,
                                minRotation: 45
                            }
                        },
                        y: {
                            stacked: true,
                            grid: { color: 'rgba(255,255,255,0.06)' },
                            beginAtZero: true,
                            ticks: {
                                color: '#94a3b8',
                                font: { size: 10 },
                                // 小数時間を分表示に変換（例: 0.5h → 30分、1.5h → 1h30分）
                                callback: function (v) {
                                    if (v === 0) return '0';
                                    const totalMin = Math.round(v * 60);
                                    const h = Math.floor(totalMin / 60);
                                    const m = totalMin % 60;
                                    if (h === 0) return m + '分';
                                    if (m === 0) return h + 'h';
                                    return h + 'h' + m + '分';
                                }
                            }
                        }
                    },
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: {
                                color: '#94a3b8',
                                font: { size: 10 },
                                padding: 25, // パディングを多めにとって重なりを確実に防ぐ
                                boxWidth: 10,
                                boxHeight: 10
                            }
                        },
                        datalabels: {
                            display: false
                        },

                            }

                    }
                }

        // ===== ユーティリティ関数 =====

        function getTodayStr() {
            const now = new Date();
            const y = now.getFullYear();
            const m = String(now.getMonth() + 1).padStart(2, '0');
            const d = String(now.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        // 日付形式を YYYY-MM-DD に正規化し、UTCの場合はJSTに補正する
        function normalizeDate(dateStr) {
            if (!dateStr) return '';
            let s = String(dateStr);
            if (s.includes('T') && s.endsWith('Z')) {
                const d = new Date(s);
                // UTCからJST(+9h)へ
                const jst = new Date(d.getTime() + (9 * 60 * 60 * 1000));
                return jst.toISOString().substring(0, 10);
            }
            // 2024/03/01 -> 2024-03-01 等
            return s.substring(0, 10).replace(/\//g, '-');
        }

        function formatDateJP(dateStr) {
            if (!dateStr) return '';
            const [y, m, d] = dateStr.split('-');
            return `${y}年${parseInt(m)}月${parseInt(d)}日`;
        }

        function formatDateShort(dateStr) {
            if (!dateStr) return '';
            const [, m, d] = dateStr.split('-');
            return `${parseInt(m)}/${parseInt(d)}`;
        }

        function calcDuration(startTime, endTime) {
            const min = calcDurationMin(startTime, endTime);
            if (min <= 0) return '';
            const h = Math.floor(min / 60);
            const m = min % 60;
            return h > 0 ? `${h}時間${m > 0 ? m + '分' : ''}` : `${m}分`;
        }

        function calcDurationMin(startTime, endTime) {
            if (!startTime || !endTime) return 0;

            // ISO形式（Google SheetsのDate型由来: "1899-12-29T..."）を HH:mm に変換する
            function toMinutesOfDay(s) {
                s = String(s).trim();
                if (s.includes('T')) {
                    // UTCのISOをJST(+9h)に変換して時刻を取り出す
                    const d = new Date(s);
                    const jst = new Date(d.getTime() + 9 * 60 * 60 * 1000);
                    return jst.getUTCHours() * 60 + jst.getUTCMinutes();
                }
                // 通常の "HH:mm" または "H:mm" 形式
                const parts = s.split(':').map(Number);
                const h = isNaN(parts[0]) ? 0 : parts[0];
                const m = isNaN(parts[1]) ? 0 : parts[1];
                return h * 60 + m;
            }

            const startMin = toMinutesOfDay(startTime);
            const endMin = toMinutesOfDay(endTime);
            let diff = endMin - startMin;

            // 日をまたぐ場合（例: 23:50→00:10 = 20分）
            if (diff < 0) diff += 24 * 60;
            return diff;
        }

        function getCatClass(cat) {
            if (cat === '学習') return 'cat-study';
            if (cat === '休憩') return 'cat-rest';
            return 'cat-other';
        }

        function getCatIcon(cat) {
            const icons = { '学習': '📚', '休憩': '☕', '運動': '🏃', '食事': '🍽️', '睡眠': '😴', 'その他': '📌' };
            return icons[cat] || '📌';
        }

        function escapeHtml(str) {
            if (!str) return '';
            return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function showToast(msg, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = `show ${type}`;
            setTimeout(() => { toast.className = type; }, 3000);
        }

        // ===== 質問タブ: 質問を投稿 =====
        async function submitQuestion() {
            // ユーザー名は記録タブと共用
            const userName = document.getElementById('userName').value.trim();
            const subject = document.getElementById('qSubject').value;
            const title = document.getElementById('qTitle').value.trim();
            const body = document.getElementById('qBody').value.trim();

            // バリデーション
            if (!userName) {
                showToast('「記録」タブでお名前を入力してください', 'error');
                return;
            }
            if (!title) {
                showToast('タイトルを入力してください', 'error');
                document.getElementById('qTitle').focus();
                return;
            }
            if (!body) {
                showToast('質問内容を入力してください', 'error');
                document.getElementById('qBody').focus();
                return;
            }
            if (GAS_URL === 'ここにGASのWebアプリURLを貼り付けます') {
                showToast('GASのURLが設定されていません', 'error');
                return;
            }

            const btn = document.getElementById('qSubmitBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>送信中...';

            const payload = { action: 'postQuestion', userName, subject, title, body };

            try {
                await fetch(GAS_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                showToast('✅ 質問を送信しました！', 'success');

                // フォームリセット
                document.getElementById('qTitle').value = '';
                document.getElementById('qBody').value = '';

                // 少し待ってから一覧を更新
                setTimeout(() => loadQuestions(), 1500);

            } catch (err) {
                console.error(err);
                showToast('❌ 送信に失敗しました', 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '質問を送信';
            }
        }

        // ===== 質問タブ: 質問一覧を取得 =====
        async function loadQuestions() {
            if (GAS_URL === 'ここにGASのWebアプリURLを貼り付けます') {
                renderQuestions([]);
                return;
            }
            try {
                const res = await fetch(GAS_URL + '?action=getQuestions&t=' + Date.now());
                const json = await res.json();
                if (json.status === 'success') {
                    renderQuestions(json.questions || []);
                } else {
                    console.error('質問取得エラー:', json.message);
                }
            } catch (err) {
                console.error('質問取得エラー:', err);
            }
        }

        // 初期化時に教科フィールドの表示を設定
        toggleStudyFields();

        // =====================================================
        // ===== タイマー・ストップウォッチ =====
        // =====================================================

        // ----- 共通: タイマーモード切り替え -----
        let timerMode = 'sw'; // 'sw' or 'cd'

        function setTimerMode(mode) {
            timerMode = mode;
            // モードタブのactive切り替え
            document.getElementById('modeSwBtn').classList.toggle('active', mode === 'sw');
            document.getElementById('modeCdBtn').classList.toggle('active', mode === 'cd');

            document.getElementById('cdPanel').style.display = (mode === 'cd') ? 'block' : 'none';

            if (mode === 'sw') { swReset(); } else { cdResetAll(); }

        // ----- 共通: タイマー終了時に記録をGASへ送信 -----
        async function sendTimerRecord(startTime, endTime, durationMin) {
            const userName = document.getElementById('userName').value.trim();
            const subject = document.getElementById('timerSubject').value;
            const content = document.getElementById('timerContent').value.trim();
            const memo = document.getElementById('timerMemo').value.trim();

            if (!userName) {
                showToast('「記録」タブでお名前を入力してから使ってください', 'error');
                return;
            }
            if (GAS_URL === 'ここにGASのWebアプリURLを貼り付けます') {
                showToast('GASのURLが設定されていません', 'error');
                return;
            }

            const today = getTodayStr();
            const payload = {
                userName,
                date: today,
                category: '学習',
                subject,
                content: content || (subject + ' ' + durationMin + '分'),
                startTime,
                endTime,
                memo: memo || (timerMode === 'sw' ? 'ストップウォッチで計測' : 'カウントダウンタイマーで計測')
            };

            try {
                await fetch(GAS_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                showToast(`✅ ${subject} ${durationMin}分を記録しました！`, 'success');
                // データ再取得
                setTimeout(() => loadData(), 1500);
            } catch (err) {
                console.error('タイマー記録エラー:', err);
                showToast('❌ 記録の送信に失敗しました', 'error');
            }
        }

        // =====================================================
        // ===== ストップウォッチ =====
        // =====================================================
        let swRunning = false;
        let swStartEpoch = 0;    // 開始時のepoch ms
        let swElapsed = 0;    // 累積経過ms
        let swTimerID = null;
        let swLaps = [];
        let swRealStart = null; // 最初に開始した時刻（HH:MM）

        function swToggle() {
            if (!swRunning) {
                // 開始 or 再開
                swRunning = true;
                swStartEpoch = Date.now() - swElapsed;
                if (!swRealStart) {
                    const now = new Date();
                    swRealStart = String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
                }
                swTimerID = requestAnimationFrame(swTick);
                // UIアップデート
                document.getElementById('swDisplay').classList.add('running');
                document.getElementById('swMs').classList.add('running');
                document.getElementById('swStartBtn').classList.add('pause');
                document.getElementById('swIcon').innerHTML = `
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 9v6m4-6v6m7-3a9 9 0 11-18 0 9 9 0 0118 0z"/>`;
                document.getElementById('swLapBtn').disabled = false;
                document.getElementById('swStopBtn').disabled = false;
            } else {
                // 一時停止
                swRunning = false;
                cancelAnimationFrame(swTimerID);
                swElapsed = Date.now() - swStartEpoch;
                document.getElementById('swDisplay').classList.remove('running');
                document.getElementById('swMs').classList.remove('running');
                document.getElementById('swStartBtn').classList.remove('pause');
                document.getElementById('swIcon').innerHTML = `
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>`;
            }
        }

        function swTick() {
            if (!swRunning) return;
            const elapsed = Date.now() - swStartEpoch;
            swElapsed = elapsed;
            const totalSec = Math.floor(elapsed / 1000);
            const ms = Math.floor((elapsed % 1000) / 10);
            const mm = Math.floor(totalSec / 60);
            const ss = totalSec % 60;
            document.getElementById('swDisplay').textContent =
                String(mm).padStart(2, '0') + ':' + String(ss).padStart(2, '0');
            document.getElementById('swMs').textContent = '.' + String(ms).padStart(2, '0');
            swTimerID = requestAnimationFrame(swTick);
        }

        function swLap() {
            if (!swRunning && swElapsed === 0) return;
            const elapsed = swElapsed;
            const totalSec = Math.floor(elapsed / 1000);
            const mm = Math.floor(totalSec / 60);
            const ss = totalSec % 60;
            const timeStr = String(mm).padStart(2, '0') + ':' + String(ss).padStart(2, '0');
            swLaps.unshift({ no: swLaps.length + 1, time: timeStr });
            renderLaps();
        }

        function swStop() {
            if (swRunning) {
                swRunning = false;
                cancelAnimationFrame(swTimerID);
            }
            const now = new Date();
            const endTime = String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
            const durationMin = Math.max(1, Math.round(swElapsed / 60000));
            // GASへ送信
            sendTimerRecord(swRealStart || endTime, endTime, durationMin);
            // リセット
            swReset();
        }

        function swReset() {
            swRunning = false;
            cancelAnimationFrame(swTimerID);
            swElapsed = 0;
            swRealStart = null;
            swLaps = [];
            document.getElementById('swDisplay').textContent = '00:00';
            document.getElementById('swDisplay').className = 'timer-display';
            document.getElementById('swMs').textContent = '.00';
            document.getElementById('swMs').className = 'timer-ms mb-1';
            document.getElementById('swStartBtn').classList.remove('pause');
            document.getElementById('swIcon').innerHTML = `
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>`;
            document.getElementById('swLapBtn').disabled = true;
            document.getElementById('swStopBtn').disabled = true;
            renderLaps();
        }

        function renderLaps() {
            const list = document.getElementById('lapList');
            if (swLaps.length === 0) {
                list.innerHTML = '';
                return;
            }
            list.innerHTML = swLaps.map(l =>
                `<div class="lap-item">
                   <span class="text-slate-400">Lap ${l.no}</span>
                   <span class="text-white font-mono">${l.time}</span>
                 </div>`
            ).join('');
        }

        // =====================================================
        // ===== カウントダウンタイマー =====
        // =====================================================
        const CD_CIRCUMFERENCE = 615.75; // 2πr (r=98)
        let cdRunning = false;
        let cdTotalSec = 25 * 60; // デフォルト25分
        let cdRemainSec = cdTotalSec;
        let cdIntervalID = null;
        let cdStartTime = null;  // HH:MM

        // スライダー変更時にcdTotalSecとdisplayを更新
        function cdUpdateSlider() {
            const m = parseInt(document.getElementById('cdMinSlider').value, 10);
            const s = parseInt(document.getElementById('cdSecSlider').value, 10);
            document.getElementById('cdMinVal').textContent = m;
            document.getElementById('cdSecVal').textContent = s;
            cdTotalSec = m * 60 + s;
            cdRemainSec = cdTotalSec;
            cdUpdateDisplay(cdTotalSec);
            // リングをフル表示
            document.getElementById('cdRing').style.strokeDashoffset = '0';
            document.getElementById('cdStatusLabel').textContent = '時間を設定して開始';
            // プリセットボタンの選択状態を解除
            document.querySelectorAll('.cd-preset-btn').forEach(btn => btn.classList.remove('selected'));
        }

        function cdUpdateDisplay(sec) {
            const m = Math.floor(sec / 60);
            const s = sec % 60;
            document.getElementById('cdDisplay').textContent =
                String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
        }

        function cdUpdateRing(remainSec) {
            const ratio = cdTotalSec > 0 ? remainSec / cdTotalSec : 0;
            const offset = CD_CIRCUMFERENCE * (1 - ratio);
            document.getElementById('cdRing').style.strokeDashoffset = offset;
            // 残り少ないと赤に
            if (ratio < 0.2) {
                document.getElementById('cdRing').style.stroke = '#f87171';
            } else {
                document.getElementById('cdRing').style.stroke = '#818cf8';
            }
        }

        function cdToggle() {
            if (cdTotalSec <= 0 && !cdRunning) {
                showToast('時間を設定してください', 'error');
                return;
            }
            if (!cdRunning) {
                // 開始
                cdRunning = true;
                if (!cdStartTime) {
                    const now = new Date();
                    cdStartTime = String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
                }
                // スライダーを非表示
                document.getElementById('cdSettings').style.display = 'none';
                document.getElementById('cdStatusLabel').textContent = '計測中...';
                document.getElementById('cdDisplay').classList.add('running');
                // 一時停止アイコン
                document.getElementById('cdIcon').innerHTML = `
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 9v6m4-6v6m7-3a9 9 0 11-18 0 9 9 0 0118 0z"/>`;
                document.getElementById('cdStartBtn').classList.add('pause');
                cdIntervalID = setInterval(cdTick, 1000);
            } else {
                // 一時停止
                cdRunning = false;
                clearInterval(cdIntervalID);
                document.getElementById('cdDisplay').classList.remove('running');
                document.getElementById('cdStatusLabel').textContent = '一時停止中';
                document.getElementById('cdStartBtn').classList.remove('pause');
                document.getElementById('cdIcon').innerHTML = `
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>`;
            }
        }

        function cdTick() {
            if (cdRemainSec <= 0) {
                cdFinish();
                return;
            }
            cdRemainSec--;
            cdUpdateDisplay(cdRemainSec);
            cdUpdateRing(cdRemainSec);
            if (cdRemainSec <= 0) cdFinish();
        }

        function cdFinish() {
            clearInterval(cdIntervalID);
            cdRunning = false;
            document.getElementById('cdDisplay').classList.remove('running');
            document.getElementById('cdDisplay').classList.add('finished');
            document.getElementById('cdStatusLabel').textContent = '終了！';
            document.getElementById('cdStartBtn').classList.remove('pause');
            document.getElementById('cdIcon').innerHTML = `
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>`;

            // 終了音（ブラウザのビープ音）
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                [0, 0.3, 0.6].forEach(delay => {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain); gain.connect(ctx.destination);
                    osc.frequency.value = 880;
                    gain.gain.setValueAtTime(0.3, ctx.currentTime + delay);
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + 0.4);
                    osc.start(ctx.currentTime + delay);
                    osc.stop(ctx.currentTime + delay + 0.4);
                });
            } catch (e) { }

            // GASへ送信
            const now = new Date();
            const endTime = String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
            const durationMin = Math.max(1, Math.round(cdTotalSec / 60));
            sendTimerRecord(cdStartTime || endTime, endTime, durationMin);
        }

        function cdReset() {
            clearInterval(cdIntervalID);
            cdRunning = false;
            cdStartTime = null;
            cdRemainSec = cdTotalSec;
            cdUpdateDisplay(cdTotalSec);
            cdUpdateRing(cdTotalSec);
            document.getElementById('cdDisplay').classList.remove('running', 'finished');
            document.getElementById('cdRing').style.stroke = '#818cf8';
            document.getElementById('cdSettings').style.display = 'block';
            document.getElementById('cdStatusLabel').textContent = '時間を設定して開始';
            document.getElementById('cdStartBtn').classList.remove('pause');
            document.getElementById('cdIcon').innerHTML = `
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>`;
        }

        function cdResetAll() {
            cdReset();
            cdTotalSec = parseInt(document.getElementById('cdMinSlider').value, 10) * 60
                + parseInt(document.getElementById('cdSecSlider').value, 10);
            cdRemainSec = cdTotalSec;
            cdUpdateDisplay(cdTotalSec);
            document.getElementById('cdRing').style.strokeDashoffset = '0';
            // プリセットボタンの選択状態を解除
            document.querySelectorAll('.cd-preset-btn').forEach(btn => btn.classList.remove('selected'));
        }

        // ----- プリセットボタンで分数を一発セット -----
        function cdPreset(minutes) {
            if (cdRunning) return; // 実行中は操作不可
            document.getElementById('cdMinSlider').value = minutes;
            document.getElementById('cdSecSlider').value = 0;
            document.getElementById('cdMinVal').textContent = minutes;
            document.getElementById('cdSecVal').textContent = 0;
            cdTotalSec = minutes * 60;
            cdRemainSec = cdTotalSec;
            cdUpdateDisplay(cdTotalSec);
            document.getElementById('cdRing').style.strokeDashoffset = '0';
            document.getElementById('cdStatusLabel').textContent = '時間を設定して開始';
            // 選択中状態を更新
            [10, 20, 30, 40, 50, 60].forEach(m => {
                document.getElementById('preset' + m).classList.toggle('selected', m === minutes);
            });
        }

    </script>
</body>


</html>
